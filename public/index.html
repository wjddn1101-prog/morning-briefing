<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아침 출근 브리핑</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #fff;
      padding: 20px;
    }
    .container { max-width: 480px; margin: 0 auto; }
    h1 { text-align: center; font-size: 1.4rem; margin-bottom: 8px; opacity: 0.9; }
    .subtitle { text-align: center; font-size: 0.85rem; opacity: 0.5; margin-bottom: 24px; }

    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 14px;
      backdrop-filter: blur(10px);
    }
    .card-title { font-size: 0.75rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .big-number { font-size: 2.4rem; font-weight: 700; }
    .big-number span { font-size: 1rem; font-weight: 400; opacity: 0.7; }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-top: 6px;
    }
    .badge.ok { background: rgba(52,199,89,0.2); color: #34c759; border: 1px solid #34c759; }
    .badge.warn { background: rgba(255,159,10,0.2); color: #ff9f0a; border: 1px solid #ff9f0a; }
    .badge.danger { background: rgba(255,69,58,0.2); color: #ff453a; border: 1px solid #ff453a; }

    .row { display: flex; gap: 14px; }
    .row .card { flex: 1; }

    .weather-temp { font-size: 2rem; font-weight: 700; }
    .weather-desc { font-size: 0.9rem; opacity: 0.7; margin-top: 4px; }
    .weather-detail { font-size: 0.8rem; opacity: 0.5; margin-top: 8px; }

    .incident-list { list-style: none; }
    .incident-list li {
      font-size: 0.85rem;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      opacity: 0.8;
    }
    .incident-list li:last-child { border-bottom: none; }
    .no-incident { font-size: 0.85rem; opacity: 0.5; }

    .departure-time { font-size: 2.2rem; font-weight: 700; color: #64d2ff; }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 10px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #007aff, #5ac8fa);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .status-bar {
      text-align: center;
      font-size: 0.8rem;
      opacity: 0.4;
      margin-top: 16px;
    }
    .loading { text-align: center; opacity: 0.6; padding: 40px 0; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .umbrella-notice {
      background: rgba(255,159,10,0.15);
      border: 1px solid rgba(255,159,10,0.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-top: 10px;
    }
    #briefing-section { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌅 아침 출근 브리핑</h1>
    <p class="subtitle">부산진구 동평로 → 김해 경원로</p>

    <button class="btn btn-primary" id="refresh-btn" onclick="loadBriefing()">
      📡 브리핑 생성
    </button>

    <div class="loading" id="loading-section" style="display:none;">
      <div class="spinner"></div>
      <p>T-map & 날씨 정보 수집 중...</p>
    </div>

    <div id="briefing-section">
      <!-- 추천 출발 -->
      <div class="card">
        <div class="card-title">추천 출발 시각</div>
        <div class="departure-time" id="departure-time">--:--</div>
        <div style="font-size:0.8rem; opacity:0.5; margin-top:4px">8시 30분 도착 기준</div>
      </div>

      <div class="row">
        <!-- 소요시간 -->
        <div class="card">
          <div class="card-title">예상 소요</div>
          <div class="big-number" id="travel-time">--<span>분</span></div>
          <div id="delay-badge"></div>
        </div>
        <!-- 날씨 -->
        <div class="card">
          <div class="card-title">날씨</div>
          <div class="weather-temp" id="weather-temp">--</div>
          <div class="weather-desc" id="weather-desc">--</div>
          <div class="weather-detail" id="weather-detail"></div>
        </div>
      </div>

      <!-- 사고·공사 -->
      <div class="card">
        <div class="card-title">🚧 사고 · 공사 구간</div>
        <ul class="incident-list" id="incident-list"></ul>
      </div>

      <!-- 외출 팁 (코디/미세먼지) -->
      <div class="card">
        <div class="card-title">💡 외출 팁</div>
        <div id="weather-outfit" style="font-size: 0.9rem; line-height: 1.4; opacity: 0.9;">--</div>
        <div id="weather-dust" class="badge" style="margin-top: 8px;">미세먼지: --</div>
      </div>

      <!-- 오늘의 일정 -->
      <div class="card" id="events-card" style="display:none;">
        <div class="card-title">📅 오늘의 일정</div>
        <ul class="incident-list" id="events-list"></ul>
      </div>

      <div id="umbrella-notice" class="umbrella-notice" style="display:none;">
        ☂️ 오늘 우산을 챙기세요!
      </div>
    </div>

    <div class="status-bar" id="status-bar"></div>
  </div>

  <script>
    async function loadBriefing() {
      const btn = document.getElementById('refresh-btn');
      btn.disabled = true;
      btn.textContent = '⏳ 생성 중...';
      document.getElementById('loading-section').style.display = 'block';
      document.getElementById('briefing-section').style.display = 'none';

      try {
        const res = await fetch('/api/briefing');
        const data = await res.json();

        if (!data.success) throw new Error(data.error || '오류 발생');

        renderBriefing(data.briefing);
      } catch (err) {
        document.getElementById('status-bar').textContent = '오류: ' + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = '🔄 새로고침';
        document.getElementById('loading-section').style.display = 'none';
      }
    }

    function renderBriefing(b) {
      const { route, weather, events, recommendedDeparture, generatedAt } = b;

      document.getElementById('briefing-section').style.display = 'block';
      document.getElementById('departure-time').textContent = recommendedDeparture;

      // 소요시간
      document.getElementById('travel-time').innerHTML = `${route.totalTime}<span>분</span>`;

      // 지연 배지
      const badge = document.getElementById('delay-badge');
      if (route.isDelayed) {
        badge.innerHTML = `<span class="badge warn">⚠️ ${route.delayMin}분 지연</span>`;
      } else {
        badge.innerHTML = `<span class="badge ok">✅ 정상</span>`;
      }

      // 날씨
      document.getElementById('weather-temp').textContent = weather.temp;
      document.getElementById('weather-desc').textContent = weather.weatherDesc;
      document.getElementById('weather-detail').textContent =
        `강수 ${weather.rainProb} · 바람 ${weather.windSpeed}`;

      // 사고·공사
      const list = document.getElementById('incident-list');
      list.innerHTML = '';
      if (route.incidents.length === 0) {
        list.innerHTML = '<li class="no-incident">특이사항 없음 ✓</li>';
      } else {
        route.incidents.forEach(i => {
          const li = document.createElement('li');
          li.textContent = i;
          list.appendChild(li);
        });
      }

      // 팁 & 미세먼지
      if (weather.outfit) {
        document.getElementById('weather-outfit').innerText = weather.outfit.replace(/\n/g, '<br>');
      }
      const dustBadge = document.getElementById('weather-dust');
      dustBadge.textContent = `${weather.dust} (PM10: ${weather.pm10 || '-'})`;
      dustBadge.className = `badge ${weather.dust && weather.dust.includes('나쁨') ? 'danger' : 'ok'}`;

      // 오늘의 이벤트 (일정)
      const eventsCard = document.getElementById('events-card');
      const eventsList = document.getElementById('events-list');
      eventsList.innerHTML = '';
      if (events && events.length > 0) {
        eventsCard.style.display = 'block';
        events.forEach(e => {
          const li = document.createElement('li');
          li.textContent = e;
          eventsList.appendChild(li);
        });
      } else {
        eventsCard.style.display = 'none';
      }

      // 우산
      document.getElementById('umbrella-notice').style.display =
        weather.needUmbrella ? 'block' : 'none';

      document.getElementById('status-bar').textContent =
        `마지막 업데이트: ${generatedAt} · ${route.totalDistance}km`;
    }

    // 페이지 로드 시 기존 브리핑 표시
    fetch('/api/latest')
      .then(r => r.json())
      .then(data => {
        if (data.success) renderBriefing(data.briefing);
      });
  </script>
</body>
</html>
