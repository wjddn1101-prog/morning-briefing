name: 아침 출근 브리핑

on:
  schedule:
    # 평일(월~금) 오전 7:10 KST = 22:10 UTC (전날 일~목)
    # 공휴일 체크는 run-briefing.js 내부에서 처리
    - cron: '10 22 * * 0-4'
  workflow_dispatch:
    inputs:
      send_now:
        description: '수동으로 브리핑을 즉시 발송'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 패키지 설치
        run: npm ci || npm install

      - name: 브리핑 실행
        env:
          MANUAL_SEND: ${{ inputs.send_now }}
          TMAP_APP_KEY: ${{ secrets.TMAP_APP_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          ICAL_URL: ${{ secrets.ICAL_URL }}
          ORIGIN_ADDRESS: 부산광역시 부산진구 동평로 176
          DEST_ADDRESS: 경남 김해시 경원로 73번길 15
        run: node scripts/run-briefing.js

      - name: GitHub Pages 배포 (위젯 데이터)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          commit_message: "chore: update daily widget data"
